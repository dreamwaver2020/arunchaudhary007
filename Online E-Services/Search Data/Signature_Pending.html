<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐒𝐢𝐠𝐧𝐚𝐭𝐮𝐫𝐞𝐬 𝐏𝐞𝐧𝐝𝐢𝐧𝐠</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Lucide Icons for aesthetic buttons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom styles for smaller font size and better table aesthetics */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f9;
        }
        .container {
            max-width: 1200px;
        }
        .table-auto th, .table-auto td {
            padding: 0.5rem 0.75rem; /* Reduced padding */
            font-size: 0.875rem; /* text-sm default */
        }
        .table-auto th {
            font-size: 0.75rem; /* text-xs for headers */
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b; /* slate-500 */
        }
        .status-badge {
            font-size: 0.7rem; /* Even smaller font for badges */
            font-weight: 600;
        }
        .status-approved {
            background-color: #d1fae5; /* green-100 */
            color: #059669; /* green-600 */
        }
        .status-pending {
            background-color: #fee2e2; /* red-100 */
            color: #ef4444; /* red-600 */
        }
        /* Custom scrollbar for table on smaller screens */
        .table-wrapper {
            overflow-x: auto;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="container mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">✒️𝐒𝐢𝐠𝐧𝐚𝐭𝐮𝐫𝐞𝐬 𝐏𝐞𝐧𝐝𝐢𝐧𝐠</h1>
        
        <!-- Loading and Error Message Area -->
        <div id="loading-indicator" class="hidden text-center p-4 bg-blue-100 text-blue-800 rounded-lg mb-4">
            Loading data...
        </div>
        <div id="error-message" class="hidden text-center p-4 bg-red-100 text-red-800 rounded-lg mb-4">
            An error occurred. Check console for details.
        </div>
        <!-- Custom Message for alerts/confirmation feedback -->
        <div id="message-container" class="hidden text-center p-4 bg-yellow-100 text-yellow-800 rounded-lg mb-4">
            <span id="message-text"></span>
        </div>
        <!-- Add New Record Form -->
        <div class="bg-white p-6 rounded-xl shadow-lg mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-700"> 𝓘𝓷𝓹𝓾𝓽 𝓓𝓮𝓽𝓪𝓲𝓵𝓼</h2>
            <form id="record-form" class="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
                <!-- Date Input -->
                <div class="md:col-span-1">
                    <label for="record-date" class="block text-xs font-medium text-gray-600 mb-1">Date</label>
                    <input type="date" id="record-date" required class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                
                <!-- Name Input -->
                <div class="md:col-span-1">
                    <label for="record-name" class="block text-xs font-medium text-gray-600 mb-1">Name</label>
                    <input type="text" id="record-name" placeholder="Enter Name" required class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500">
                </div>

                <!-- Amount Input -->
                <div class="md:col-span-1">
                    <label for="record-amount" class="block text-xs font-medium text-gray-600 mb-1">Amount ($)</label>
                    <input type="number" id="record-amount" placeholder="Enter Amount" required min="0.01" step="0.01" class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500">
                </div>

                <!-- Status Radio Buttons -->
                <div class="md:col-span-1">
                    <label class="block text-xs font-medium text-gray-600 mb-1">Status</label>
                    <div class="flex space-x-4">
                        <label class="inline-flex items-center text-sm">
                            <input type="radio" name="record-status" value="Pending" checked class="form-radio text-red-500">
                            <span class="ml-1 text-gray-700">Pending</span>
                        </label>
                        <label class="inline-flex items-center text-sm">
                            <input type="radio" name="record-status" value="Approved" class="form-radio text-green-500">
                            <span class="ml-1 text-gray-700">Approved</span>
                        </label>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="md:col-span-1">
                    <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-lg font-medium hover:bg-blue-700 transition duration-150 shadow-md flex items-center justify-center text-sm">
                        <span data-lucide="plus" class="w-4 h-4 mr-1"></span> Add Record
                    </button>
                </div>
            </form>
        </div>

        <!-- Search and Table Area -->
        <div class="bg-white p-6 rounded-xl shadow-lg">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Record List</h2>
            
            <!-- Search Input -->
            <div class="mb-4 flex justify-end">
                <div class="relative w-full max-w-xs">
                    <input type="text" id="search-name" placeholder="Search by Name (min 2 letters)" 
                           class="w-full p-2 pl-10 border border-gray-300 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500" 
                           oninput="handleSearch(this.value)">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <span data-lucide="search" class="w-4 h-4 text-gray-400"></span>
                    </span>
                </div>
            </div>

            <!-- Records Table -->
            <div class="table-wrapper">
                <table class="min-w-full divide-y divide-gray-200 table-auto">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="text-left">Date</th>
                            <th class="text-left">Name</th>
                            <th class="text-right">Amount</th>
                            <th class="text-center">Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="records-table-body" class="bg-white divide-y divide-gray-200">
                        <!-- Records will be injected here -->
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination Controls -->
            <div class="flex justify-between items-center mt-6">
                <div id="page-info" class="text-sm text-gray-600"></div>
                <div id="pagination-controls" class="flex space-x-2">
                    <button onclick="changePage(-1)" id="prev-btn" class="px-3 py-1 bg-gray-200 text-gray-700 rounded-lg text-sm disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-300 transition duration-150">
                        Previous
                    </button>
                    <button onclick="changePage(1)" id="next-btn" class="px-3 py-1 bg-blue-600 text-white rounded-lg text-sm disabled:opacity-50 disabled:cursor-not-allowed hover:bg-blue-700 transition duration-150">
                        Next
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Logic (Local Storage) -->
    <script>
        // --- GLOBAL STATE & CONSTANTS ---
        const STORAGE_KEY = 'dataRecordManager_records';
        let allRecords = []; // Stores all fetched records
        let filteredRecords = []; // Records after search/filter
        let currentPage = 1;
        const recordsPerPage = 10;
        
        // --- DOM Elements ---
        const recordForm = document.getElementById('record-form');
        const recordsTableBody = document.getElementById('records-table-body');
        const loadingIndicator = document.getElementById('loading-indicator');
        const errorMessage = document.getElementById('error-message');
        const messageContainer = document.getElementById('message-container');
        const messageText = document.getElementById('message-text');
        const searchInput = document.getElementById('search-name');
        const pageInfo = document.getElementById('page-info');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        // --- Helper Functions ---

        /**
         * Safely shows an error message on the UI.
         * @param {string} message 
         */
        const showError = (message) => {
            console.error(message);
            errorMessage.textContent = `Error: ${message}`;
            errorMessage.classList.remove('hidden');
            loadingIndicator.classList.add('hidden');
            messageContainer.classList.add('hidden');
        };
        
        /**
         * Shows a temporary, non-critical message (replaces native alerts).
         * @param {string} message 
         */
        const showTemporaryMessage = (message, duration = 3000) => {
            messageText.textContent = message;
            messageContainer.classList.remove('hidden');
            messageContainer.classList.remove('bg-red-100', 'text-red-800'); 
            messageContainer.classList.add('bg-yellow-100', 'text-yellow-800'); 
            
            setTimeout(() => {
                messageContainer.classList.add('hidden');
            }, duration);
        };

        /**
         * Hides error and shows loading.
         */
        const showLoading = () => {
            loadingIndicator.classList.remove('hidden');
            errorMessage.classList.add('hidden');
            messageContainer.classList.add('hidden');
        };

        /**
         * Hides loading.
         */
        const hideLoading = () => {
            loadingIndicator.classList.add('hidden');
        };
        
        // --- LOCAL STORAGE FUNCTIONS ---

        /**
         * Loads records from localStorage or initializes an empty array.
         * @returns {Array} The loaded and sorted records.
         */
        const loadRecords = () => {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                const records = stored ? JSON.parse(stored) : [];
                // Sort by Date (latest first)
                records.sort((a, b) => new Date(b.date) - new Date(a.date));
                return records;
            } catch (e) {
                showError("Error loading data from local storage.");
                console.error("Local Storage Load Error:", e);
                return [];
            }
        };

        /**
         * Saves the given array of records to localStorage.
         * @param {Array} records 
         * @returns {boolean} Success status
         */
        const saveRecords = (records) => {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                return true;
            } catch (e) {
                showError("Failed to save data locally. Storage limit reached?");
                console.error("Local Storage Save Error:", e);
                return false;
            }
        };

        /**
         * Loads data, sets global state, and triggers rendering.
         */
        const loadAndRenderRecords = () => {
            showLoading();
            allRecords = loadRecords();
            
            // Re-apply the current search filter (if any)
            const searchTerm = searchInput.value;
            if (searchTerm && searchTerm.length >= 2) {
                // Use handleSearch logic to recalculate filteredRecords and call renderRecords
                window.handleSearch(searchTerm); 
            } else {
                filteredRecords = allRecords;
                // If the current page is out of bounds after loading new data, reset to 1
                const totalPages = Math.ceil(filteredRecords.length / recordsPerPage);
                if (currentPage > totalPages && totalPages > 0) {
                    currentPage = totalPages;
                } else if (totalPages === 0) {
                    currentPage = 1;
                }
                renderRecords(filteredRecords); 
            }
            hideLoading();
        };

        // --- Core Application Logic ---

        /**
         * Renders the current page of records to the table.
         * @param {Array} recordsToRender The array to paginate/render (usually filteredRecords)
         */
        const renderRecords = (recordsToRender) => {
            recordsTableBody.innerHTML = '';
            
            const totalRecords = recordsToRender.length;
            const totalPages = Math.ceil(totalRecords / recordsPerPage);
            
            // Adjust current page if it's out of bounds after filtering
            if (currentPage > totalPages && totalPages > 0) {
                currentPage = totalPages;
            } else if (totalPages === 0) {
                currentPage = 1;
            }

            const startIndex = (currentPage - 1) * recordsPerPage;
            const endIndex = Math.min(startIndex + recordsPerPage, totalRecords);
            const recordsOnPage = recordsToRender.slice(startIndex, endIndex);

            // Update pagination info
            pageInfo.textContent = totalRecords === 0
                ? 'No records found.'
                : `Showing ${startIndex + 1} - ${endIndex} of ${totalRecords} records (Page ${currentPage} of ${totalPages})`;

            // Update button states
            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage >= totalPages;

            // Display messages if table is empty
            if (recordsOnPage.length === 0 && totalRecords > 0) {
                 recordsTableBody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-sm text-gray-500">
                    No records match your search criteria.
                </td></tr>`;
            } else if (recordsOnPage.length === 0 && totalRecords === 0) {
                 recordsTableBody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-sm text-gray-500">
                    No records found. Start by adding a new record above.
                </td></tr>`;
            }


            recordsOnPage.forEach(record => {
                const isApproved = record.status === 'Approved';
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition duration-100';
                
                // Format amount to USD
                const formattedAmount = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD'
                }).format(record.amount);

                row.innerHTML = `
                    <td class="whitespace-nowrap text-sm text-gray-700">${record.date}</td>
                    <td class="text-sm font-medium text-gray-900">${record.name}</td>
                    <td class="whitespace-nowrap text-sm text-right font-mono text-green-700">${formattedAmount}</td>
                    <td class="whitespace-nowrap text-center">
                        <span class="status-badge inline-flex items-center px-2.5 py-0.5 rounded-full ${isApproved ? 'status-approved' : 'status-pending'}">
                            ${record.status}
                        </span>
                    </td>
                    <td class="text-center whitespace-nowrap">
                        <div class="flex space-x-2 justify-center">
                            <button onclick="toggleStatus('${record.id}')"
                                    class="p-1 rounded-full text-xs transition duration-150 shadow-sm
                                           ${isApproved 
                                                ? 'bg-red-500 text-white hover:bg-red-600' 
                                                : 'bg-green-500 text-white hover:bg-green-600'}"
                                    title="Toggle Status to ${isApproved ? 'Pending' : 'Approved'}">
                                <span data-lucide="${isApproved ? 'x-circle' : 'check-circle'}" class="w-4 h-4"></span>
                            </button>
                            <button onclick="promptDelete('${record.id}')" 
                                    class="p-1 rounded-full bg-gray-200 text-gray-600 hover:bg-gray-300 transition duration-150 shadow-sm"
                                    title="Delete Record">
                                <span data-lucide="trash-2" class="w-4 h-4"></span>
                            </button>
                        </div>
                    </td>
                `;
                recordsTableBody.appendChild(row);
            });
            // Re-render lucide icons after injecting HTML
            lucide.createIcons();
        };

        /**
         * Applies search filter to all records and updates the filteredRecords array.
         * @param {string} searchTerm 
         */
        window.handleSearch = (searchTerm) => {
            const term = searchTerm.toLowerCase().trim();
            
            // Minimum search length check
            if (term.length > 0 && term.length < 2) {
                // If search term is too short, do nothing (keep current view)
                return;
            }

            // Filter logic
            if (term.length < 2) {
                filteredRecords = allRecords; // Show all if search is cleared
            } else {
                // Filter records where the name contains the search term
                filteredRecords = allRecords.filter(record => 
                    record.name && record.name.toLowerCase().includes(term)
                );
            }
            
            // Always reset to page 1 after a search filter change
            currentPage = 1;
            renderRecords(filteredRecords);
        };

        /**
         * Changes the current page for pagination.
         * @param {number} direction -1 for previous, 1 for next.
         */
        window.changePage = (direction) => {
            const totalPages = Math.ceil(filteredRecords.length / recordsPerPage);
            const newPage = currentPage + direction;

            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderRecords(filteredRecords);
            }
        };

        /**
         * Toggles the status of a record between Pending and Approved (Local Update).
         * @param {string} id The record ID.
         */
        window.toggleStatus = (id) => {
            showLoading();
            
            const record = allRecords.find(r => r.id === id);
            
            if (record) {
                const newStatus = record.status === 'Approved' ? 'Pending' : 'Approved';
                record.status = newStatus;

                // Save updated array to local storage and re-render
                if (saveRecords(allRecords)) {
                    loadAndRenderRecords(); 
                    showTemporaryMessage(`Status updated to ${newStatus}.`, 1500);
                }
            } else {
                showTemporaryMessage('Record not found for update.', 1500);
            }
            hideLoading();
        };
        
        /**
         * Confirms and triggers record deletion (Replaces native confirm/alert).
         * @param {string} id The record ID.
         */
        window.promptDelete = (id) => {
            // Since we cannot use native confirm(), we just proceed with a direct action
            // and show a temporary feedback message.
            showTemporaryMessage('Deleting record...', 1000);
            deleteRecord(id);
        };

        /**
         * Deletes a record from the local array and saves.
         * @param {string} id The record ID.
         */
        const deleteRecord = (id) => {
            showLoading();
            
            // Filter out the record to delete
            const initialLength = allRecords.length;
            allRecords = allRecords.filter(r => r.id !== id);
            
            if (initialLength !== allRecords.length) {
                // Save the filtered array to local storage
                if (saveRecords(allRecords)) {
                    showTemporaryMessage('Record deleted successfully.', 2000);
                    loadAndRenderRecords(); // Reload and render data
                }
            } else {
                showTemporaryMessage('Error: Record not found.', 2000);
            }

            hideLoading();
        };
        
        // --- Event Listener for New Record Form ---
        recordForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const date = document.getElementById('record-date').value;
            const name = document.getElementById('record-name').value.trim();
            const amount = parseFloat(document.getElementById('record-amount').value);
            const status = document.querySelector('input[name="record-status"]:checked').value;

            if (!date || !name || isNaN(amount) || amount <= 0) {
                showTemporaryMessage('Please fill out all fields correctly.');
                return;
            }
            
            showLoading();
            
            // Create a new record object with a unique local ID
            const newRecord = {
                id: Date.now().toString() + Math.random().toString(16).slice(2), // Simple unique ID
                date: date,
                name: name,
                amount: amount,
                status: status,
            };

            // Add to the front of the in-memory array (for latest-first sort)
            allRecords.unshift(newRecord); 
            
            // Save to local storage
            if (saveRecords(allRecords)) {
                recordForm.reset(); // Clear the form on success
                showTemporaryMessage('Record added successfully.', 2000);
                document.getElementById('record-date').valueAsDate = new Date();
                loadAndRenderRecords(); // Re-render to show the new record
            }
            
            hideLoading();
        });

        // --- Initial Setup ---
        window.onload = () => {
             // Set today's date as default for convenience
            document.getElementById('record-date').valueAsDate = new Date();
            
            // Load and render existing records from local storage
            loadAndRenderRecords();
        };

    </script>
</body>
</html>
